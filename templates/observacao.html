<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>{{ titulo }}</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:40px;
}

.caixa{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    color:#003366;
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    resize:none;
}

button{
    background:#003366;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="caixa">

<h1>{{ titulo }}</h1>

<form method="POST">

<label>Observação do RH</label>

<br><br>

<textarea
    name="observacao"
    required
    placeholder="Digite a justificativa da aprovação ou reprovação">
</textarea>

<br>

<button type="submit">
    Confirmar {{ acao }}
</button>

</form>

</div>

</body>
</html>
