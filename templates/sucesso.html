<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Justificativa Enviada</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.caixa{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
    max-width:500px;
}

h1{
    color:#003366;
}

p{
    font-size:18px;
}

a{
    text-decoration:none;
}

button{
    background:#003366;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0055aa;
}
</style>
</head>

<body>

<div class="caixa">

    <h1>✅ Justificativa enviada com sucesso!</h1>

    <p>
        A solicitação foi registrada e ficará disponível para análise do RH.
    </p>

    <a href="/">
        <button>Voltar ao Formulário</button>
    </a>

</div>

</body>
</html>
